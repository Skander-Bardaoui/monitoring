apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      # Configuration SMTP pour les emails
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'alertmanager@pidev.com'
      smtp_auth_username: 'your-email@gmail.com'
      smtp_auth_password: 'your-app-password'
      smtp_require_tls: true

    # Templates pour les notifications
    templates:
    - '/etc/alertmanager/templates/*.tmpl'

    # Route principale
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'default'
      routes:
      # Alertes critiques
      - match:
          severity: critical
        receiver: 'critical-alerts'
        continue: true
      
      # Alertes warning
      - match:
          severity: warning
        receiver: 'warning-alerts'
        continue: true
      
      # Alertes par composant
      - match:
          component: backend
        receiver: 'backend-team'
      
      - match:
          component: frontend
        receiver: 'frontend-team'
      
      - match:
          component: database
        receiver: 'database-team'
      
      - match:
          component: infrastructure
        receiver: 'devops-team'

    # Inhibition rules (éviter les alertes redondantes)
    inhibit_rules:
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'cluster', 'service']

    # Receivers (destinations des alertes)
    receivers:
    - name: 'default'
      email_configs:
      - to: 'team@pidev.com'
        headers:
          Subject: '[PI-DEV] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.default.html" . }}'

    - name: 'critical-alerts'
      email_configs:
      - to: 'critical@pidev.com'
        headers:
          Subject: '🚨 [CRITICAL] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.default.html" . }}'
      # Slack webhook (optionnel)
      slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#critical-alerts'
        title: '🚨 Critical Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'

    - name: 'warning-alerts'
      email_configs:
      - to: 'warnings@pidev.com'
        headers:
          Subject: '⚠️ [WARNING] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.default.html" . }}'

    - name: 'backend-team'
      email_configs:
      - to: 'backend-team@pidev.com'
        headers:
          Subject: '[Backend] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.default.html" . }}'

    - name: 'frontend-team'
      email_configs:
      - to: 'frontend-team@pidev.com'
        headers:
          Subject: '[Frontend] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.default.html" . }}'

    - name: 'database-team'
      email_configs:
      - to: 'database-team@pidev.com'
        headers:
          Subject: '[Database] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.default.html" . }}'

    - name: 'devops-team'
      email_configs:
      - to: 'devops-team@pidev.com'
        headers:
          Subject: '[DevOps] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.default.html" . }}'
