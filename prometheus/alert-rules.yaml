apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
data:
  alert-rules.yml: |
    groups:
    - name: application_alerts
      interval: 30s
      rules:
      # Backend alerts
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 2m
        labels:
          severity: critical
          component: backend
        annotations:
          summary: "Backend application is down"
          description: "Backend pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been down for more than 2 minutes."

      - alert: BackendHighErrorRate
        expr: rate(http_requests_total{job="backend",status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          component: backend
        annotations:
          summary: "High error rate in backend"
          description: "Backend is experiencing {{ $value | humanizePercentage }} error rate."

      - alert: BackendHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="backend"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
          component: backend
        annotations:
          summary: "High latency in backend"
          description: "Backend 95th percentile latency is {{ $value }}s."

      # Frontend alerts
      - alert: FrontendDown
        expr: up{job="frontend"} == 0
        for: 2m
        labels:
          severity: critical
          component: frontend
        annotations:
          summary: "Frontend application is down"
          description: "Frontend pod {{ $labels.pod }} has been down for more than 2 minutes."

      # ML Service alerts
      - alert: MLServiceDown
        expr: up{job="ml-service"} == 0
        for: 2m
        labels:
          severity: critical
          component: ml-service
        annotations:
          summary: "ML Service is down"
          description: "ML Service pod {{ $labels.pod }} has been down for more than 2 minutes."

      - alert: MLServiceHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="ml-service"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          component: ml-service
        annotations:
          summary: "High latency in ML Service"
          description: "ML Service 95th percentile latency is {{ $value }}s."

      - alert: MLServiceHighErrorRate
        expr: rate(http_requests_total{job="ml-service",status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          component: ml-service
        annotations:
          summary: "High error rate in ML Service"
          description: "ML Service is experiencing {{ $value | humanizePercentage }} error rate."

      # Database alerts
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database has been down for more than 1 minute."

      - alert: PostgresHighConnections
        expr: pg_stat_database_numbackends / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL connection pool nearly exhausted"
          description: "PostgreSQL is using {{ $value | humanizePercentage }} of max connections."

    - name: infrastructure_alerts
      interval: 30s
      rules:
      # Node alerts
      - alert: NodeHighCPU
        expr: 100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High CPU usage on node"
          description: "Node {{ $labels.instance }} has CPU usage above 80% (current: {{ $value }}%)."

      - alert: NodeHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High memory usage on node"
          description: "Node {{ $labels.instance }} has memory usage above 85% (current: {{ $value }}%)."

      - alert: NodeDiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs"} / node_filesystem_size_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Low disk space on node"
          description: "Node {{ $labels.instance }} disk {{ $labels.device }} is {{ $value }}% full."

      # Pod alerts
      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: critical
          component: kubernetes
        annotations:
          summary: "Pod is crash looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping."

      - alert: PodNotReady
        expr: kube_pod_status_phase{phase!~"Running|Succeeded"} > 0
        for: 5m
        labels:
          severity: warning
          component: kubernetes
        annotations:
          summary: "Pod not ready"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in {{ $labels.phase }} state for more than 5 minutes."

    - name: devops_tools_alerts
      interval: 30s
      rules:
      # Jenkins alerts
      - alert: JenkinsDown
        expr: up{job="jenkins"} == 0
        for: 2m
        labels:
          severity: critical
          component: jenkins
        annotations:
          summary: "Jenkins is down"
          description: "Jenkins has been down for more than 2 minutes."

      - alert: JenkinsHighQueueLength
        expr: jenkins_queue_size_value > 10
        for: 10m
        labels:
          severity: warning
          component: jenkins
        annotations:
          summary: "Jenkins build queue is growing"
          description: "Jenkins has {{ $value }} jobs in queue for more than 10 minutes."

      # SonarQube alerts
      - alert: SonarQubeDown
        expr: up{job="sonarqube"} == 0
        for: 2m
        labels:
          severity: warning
          component: sonarqube
        annotations:
          summary: "SonarQube is down"
          description: "SonarQube has been down for more than 2 minutes."
